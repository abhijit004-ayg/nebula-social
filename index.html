<!DOCTYPE html>
<html>
<head>
  <title>Nebula Social</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="container">

  <h1>🚀 Nebula Social</h1>

  <!-- AUTH -->
  <div class="card" id="auth-section">
    <h2>Login / Register</h2>
    <input type="email" id="email" placeholder="Email"/>
    <input type="password" id="password" placeholder="Password"/>
    <button id="loginBtn">Login</button>
    <button id="registerBtn">Register</button>
  </div>

  <!-- CREATE POST -->
  <div class="card hidden" id="post-section">
    <h2>Create Article</h2>
    <input type="text" id="title" placeholder="Article Title"/>
    <textarea id="content" placeholder="Write full article here..."></textarea>
    <input type="file" id="imageInput" accept="image/*"/>
    <button id="postBtn">Publish</button>
    <button id="logoutBtn">Logout</button>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<script type="module" src="js/feed.js"></script>

</body>
</html>
